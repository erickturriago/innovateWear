spring.application.name=innovate-wear-backend

# Configuración de PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/innovatewear_db
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver


#server.ssl.key-store=classpath:keystore.p12
#server.ssl.key-store-password=Ninguna2023*
#server.ssl.key-store-type=PKCS12
#server.ssl.key-alias=mysslcert

# Configuración de JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Configuración del servidor
server.port=8080

# Configuración de logging
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF
logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=ERROR
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%highlight(%-5level)] [%cyan(%thread)] %magenta(%logger{15}) - %msg%n

